<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e879f9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- 배경 장식 원 -->
  <circle cx="120" cy="120" r="200" fill="rgba(99,102,241,0.15)"/>
  <circle cx="1100" cy="520" r="250" fill="rgba(168,85,247,0.12)"/>
  <circle cx="950" cy="80"  r="120" fill="rgba(59,130,246,0.10)"/>
  <circle cx="60"  cy="540" r="100" fill="rgba(139,92,246,0.10)"/>

  <!-- 배경 격자 -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!--
    로고 영역: 왕관 박스(110×110) + "로또나라"(font-size 88) 가로 나란히
    추정 총 너비: 110 + 24(gap) + 352(text) = 486px
    그룹 시작 x: 600 - 486/2 = 357
    왕관 박스 top: 155 → bottom: 265 (center y: 210)
    텍스트 baseline: 155 + (110 - 63)/2 + 63 ≈ 242  (cap-height 88*0.72≈63px)
  -->
  <g filter="url(#shadow)">
    <!-- 왕관 박스 -->
    <rect x="357" y="155" width="110" height="110" rx="24" fill="url(#logoGradient)"/>
    <!-- 왕관 바닥 띠 (박스 내부 좌표 기준: 박스 origin 357,155) -->
    <rect x="375" y="231" width="74" height="12" rx="4" fill="white" opacity="0.95"/>
    <!-- 왕관 본체 -->
    <polygon points="375,231 375,203 393,217 412,185 431,217 449,203 449,231"
             fill="white" opacity="0.95"/>
    <!-- 꼭대기 보석 -->
    <circle cx="412" cy="183" r="6"   fill="white" opacity="0.95"/>
    <circle cx="375" cy="201" r="4.5" fill="white" opacity="0.85"/>
    <circle cx="449" cy="201" r="4.5" fill="white" opacity="0.85"/>
  </g>

  <!-- 로또나라 텍스트 — 왕관 박스와 수직 중앙 정렬 -->
  <text x="491" y="242"
        font-family="'Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif"
        font-size="88"
        font-weight="900"
        text-anchor="start"
        fill="url(#textGradient)"
        filter="url(#shadow)">로또나라</text>

  <!-- LOTTO KINGDOM 서브타이틀 — 로고 그룹 아래 중앙 정렬 -->
  <text x="600" y="308"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="30"
        font-weight="600"
        text-anchor="middle"
        fill="rgba(255,255,255,0.55)"
        letter-spacing="8">LOTTO KINGDOM</text>

  <!-- 구분선 -->
  <rect x="420" y="332" width="360" height="2" rx="1" fill="rgba(255,255,255,0.20)"/>

  <!-- 설명 텍스트 -->
  <text x="600" y="384"
        font-family="'Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif"
        font-size="28"
        font-weight="500"
        text-anchor="middle"
        fill="rgba(255,255,255,0.80)">행운의 번호를 생성하고 당첨을 확인하세요</text>

  <!-- 기능 배지 3개 -->
  <!-- 배지 1: 번호 생성 (x=320) -->
  <rect x="230" y="432" width="180" height="52" rx="26"
        fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="320" y="465"
        font-family="system-ui" font-size="22" font-weight="700"
        text-anchor="middle" fill="white">🎲 번호 생성</text>

  <!-- 배지 2: 당첨 확인 (x=600) -->
  <rect x="510" y="432" width="180" height="52" rx="26"
        fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="600" y="465"
        font-family="system-ui" font-size="22" font-weight="700"
        text-anchor="middle" fill="white">🏆 당첨 확인</text>

  <!-- 배지 3: 실시간 통계 (x=880) -->
  <rect x="790" y="432" width="180" height="52" rx="26"
        fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="880" y="465"
        font-family="system-ui" font-size="22" font-weight="700"
        text-anchor="middle" fill="white">📊 실시간 통계</text>

  <!-- 하단 URL -->
  <text x="600" y="600"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="20" font-weight="500"
        text-anchor="middle"
        fill="rgba(255,255,255,0.30)">lotto-kingdom.com</text>
</svg>
